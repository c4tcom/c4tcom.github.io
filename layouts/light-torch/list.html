{{ define "main" }}
<header style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
  <h1>
    <img src="/images/light-torch.png" width="85" style="vertical-align:middle; display:inline; margin-right:8px;">
    Light Torch
  </h1>
  {{ with .Description }}
  <p style="color: var(--secondary); margin-top: 0.5rem; font-size: 0.95rem;">{{ . }}</p>
  {{ end }}
</header>

{{ range .Pages }}
<article class="post-entry">
  <header class="entry-header">
    <h2 class="entry-hint-parent">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </h2>
  </header>
  <div class="entry-content">
    <p>{{ .Summary }}</p>
  </div>
  <footer class="entry-footer">
    <span>{{ .Date.Format "January 2, 2006" }}</span>
    <span>&nbsp;·&nbsp;{{ .ReadingTime }} min</span>
    {{ with .Params.tags }}
    &nbsp;·&nbsp;
    {{ range . }}
    <a href="/tags/{{ . | urlize }}" style="font-size: 0.78rem; color: var(--secondary); margin-right: 4px;">#{{ . }}</a>
    {{ end }}
    {{ end }}
  </footer>
  <a class="entry-link" href="{{ .Permalink }}" aria-label="{{ .Title }}"></a>
</article>
{{ end }}

{{ end }}
