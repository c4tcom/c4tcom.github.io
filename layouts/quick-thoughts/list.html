{{ define "main" }}
<link rel="stylesheet" href="https://unpkg.com/xp.css">

<style>
  .xp-read-more {
    text-decoration: none;
    display: inline-block;
    margin-top: 0.75rem;
  }
</style>

{{ range .Pages }}
<div class="thought-entry">
  <h2>{{ .Title }}</h2>
  <p style="font-size: 0.82rem; color: var(--secondary);">{{ .Date.Format "02 Jan 2006" }} &nbsp;·&nbsp; {{ .ReadingTime }} min read</p>
  <p>{{ .Summary }}</p>
  <a class="xp-read-more" href="{{ .Permalink }}"><button>Read more »</button></a>
</div>
<hr>
{{ end }}

{{ end }}
