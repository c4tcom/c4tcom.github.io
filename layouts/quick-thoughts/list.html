{{ define "main" }}
<style>
  .xp-read-more {
    text-decoration: none;
    display: inline-block;
    margin-top: 0.75rem;
  }

  /* XP button styles scoped only to .xp-btn */
  .xp-btn {
    box-sizing: border-box;
    border: 1px solid;
    border-color: #fff #848484 #848484 #fff;
    box-shadow: 1px 1px 0 #000, inset 1px 1px 0 #dfdfdf;
    background: #d4d0c8;
    color: #000;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 11px;
    padding: 3px 10px;
    cursor: pointer;
    min-width: 75px;
  }
  .xp-btn:active {
    border-color: #848484 #fff #fff #848484;
    box-shadow: -1px -1px 0 #000, inset -1px -1px 0 #dfdfdf;
  }
</style>

{{ range .Pages }}
<article class="post-entry">
  <header class="entry-header">
    <h2 class="entry-hint-parent">{{ .Title }}</h2>
  </header>
  <div class="entry-content">
    <p>{{ .Summary }}</p>
  </div>
  <footer class="entry-footer">
    <span>{{ .Date.Format "January 2, 2006" }}</span>
    <span>&nbsp;·&nbsp;{{ .ReadingTime }} min</span>
  </footer>
  <a class="xp-read-more" href="{{ .Permalink }}">
    <button class="xp-btn">Read more »</button>
  </a>
</article>
{{ end }}

{{ end }}
