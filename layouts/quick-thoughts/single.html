{{ define "main" }}
<link rel="stylesheet" href="https://unpkg.com/xp.css">

<style>
  .thought-meta {
    font-size: 0.82rem;
    color: var(--secondary);
    margin-bottom: 1.5rem;
  }
  .post-tags span {
    background: #000080;
    color: white;
    font-size: 0.75rem;
    padding: 1px 6px;
    margin-right: 4px;
    font-family: 'Trebuchet MS', sans-serif;
  }
  .xp-back {
    text-decoration: none;
    display: inline-block;
    margin-top: 2rem;
  }
</style>

<h1>{{ .Title }}</h1>
<p class="thought-meta">
  {{ .Date.Format "02 Jan 2006" }} &nbsp;·&nbsp; {{ .ReadingTime }} min read
  {{ with .Params.tags }}
  &nbsp;·&nbsp;
  {{ range . }}<span class="post-tags"><span>{{ . }}</span></span>{{ end }}
  {{ end }}
</p>

{{ .Content }}

<a class="xp-back" href="/quick-thoughts/"><button>← Back to Quick Thoughts</button></a>

{{ end }}
